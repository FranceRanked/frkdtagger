name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build all versions
        run: ./gradlew build -Pmod.version=1.0.${{ github.run_number }} --stacktrace

      - name: Collect jars
        run: |
          mkdir -p release
          find versions -path '*/build/libs/*.jar' ! -name '*-sources.jar' -exec cp {} release/ \;

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: frrktagger-jars
          path: release/*.jar
          if-no-files-found: error

      - name: Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 1.0.${{ github.run_number }}
          name: 1.0.${{ github.run_number }}
          files: release/*.jar
